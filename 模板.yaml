#适配openclash,flcash等 Meta 或 Premium 内核
mixed-port: 7890
allow-lan: true
bind-address: 0.0.0.0
ipv6: false
unified-delay: true
log-level: warning
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  prefer-h3: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.msftconnecttest.com
    - +.msftncsi.com
    - localhost.ptlogin2.qq.com
    - localhost.sec.qq.com
    - localhost.work.weixin.qq.com
  use-hosts: false
  use-system-hosts: false
  default-nameserver:
    - tls://223.5.5.5
    - tls://119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxy-providers:
  mj: #同步mj.yaml更改
    type: http # 订阅类型：从 HTTP URL 获取节点
    url: https://XXXXXXX # 订阅链接
    interval: 86400 # 自动更新间隔：86400 秒 = 24 小时
    path: ./proxy-providers/mj.yaml # 本地缓存路径
    health-check: # 健康检查配置
      enable: true # 启用节点健康检查
      interval: 300 # 检查间隔：300 秒 = 5 分钟
      url: https://www.gstatic.com/generate_204 # 测速 URL
    override: # 节点覆写配置
      additional-prefix: "MJ|" # 为所有节点名称添加前缀 "MJ|"，用于区分不同机场

rule-providers:
  MyDirect:
    type: http
    format: yaml
    interval: 86400
    behavior: classical
    url: https://raw.githubusercontent.com/shineben/MyClash/main/MyDirect.yaml
    path: ./ruleset/MyDirect.yaml
    proxy: 🌍 Proxy

  MyProxy:
    type: http
    format: yaml
    interval: 86400
    behavior: classical
    url: https://raw.githubusercontent.com/shineben/MyClash/main/MyProxy.yaml
    path: ./ruleset/MyProxy.yaml
    proxy: 🌍 Proxy

  gfw:
    type: http
    format: text
    interval: 86400
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
    path: ./ruleset/gfw.txt
    proxy: 🌍 Proxy

  Emby:
    type: http
    format: yaml
    interval: 86400
    behavior: classical
    url: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script/rule/Clash/Emby/Emby.yaml
    path: ./ruleset/Emby.yaml
    proxy: 🌍 Proxy

proxy-groups:
  - name: 🌍 Proxy
    type: select
    include-all: true
    proxies:
      - 🔄 AUTO
      - 🎯 DIRECT
      - 🚫 REJECT
      - 🇭🇰 香港
      - 🇹🇼 台湾
      - 🇯🇵 日本
      - 🇰🇷 韩国
      - 🇺🇸 美国
      - 🇩🇪 德国
      - 🇸🇬 新加坡
      - 🇫🇷 法国
      - 🇬🇧 英国
      - 🌐 其他

  - name: 🔄 AUTO
    type: url-test
    include-all: true
    tolerance: 50
    exclude-filter: "(?i)GB|Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|限速|限量|限时|限流|限额|限制|永久|免费|官|卡"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: 🐟 漏网之鱼
    type: select
    include-all: true
    proxies:
      - 🎯 DIRECT
      - 🌍 Proxy

  - name: 🍎 Apple
    type: select
    include-all: true
    proxies:
      - 🎯 DIRECT
      - 🌍 Proxy

